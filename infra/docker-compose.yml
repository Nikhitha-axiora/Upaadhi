services:
  postgres:
    image: postgres:16-alpine
    container_name: upaadhi-postgres
    environment:
      POSTGRES_USER: upaadhi
      POSTGRES_PASSWORD: upaadhi
      POSTGRES_DB: upaadhi
    ports:
      - "5432:5432"
    volumes:
      - upaadhi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upaadhi -d upaadhi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  upaadhi_postgres_data:

